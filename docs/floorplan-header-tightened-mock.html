<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Markur — floorplan header (tightened)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
  :root{
    --navy:#222B3A; --navy2:#2E3848; --line:rgba(0,0,0,.12);
    --bar:#D9D5CC; --page:#EEEBE4; --surface:#fff;
    --ink:#222B3A; --muted:#6E6B64; --faint:#9A978F;
    --orange:#E0602A; --orange-deep:#B0541A; --orange-soft:#FBE6DA;
    --green:#2F7D31; --green-soft:#E6F3E1;
    --slate:#39414F; --slate-soft:#EDEDF0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#CFCBC2;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);padding:24px}
  .app{max-width:1180px;margin:0 auto;border-radius:14px;overflow:hidden;box-shadow:0 10px 36px rgba(0,0,0,.18)}

  .topbar{display:flex;align-items:center;justify-content:space-between;background:var(--navy);padding:12px 20px;border-bottom:3px solid var(--orange)}
  .logo{display:flex;align-items:baseline;gap:8px;color:#fff}
  .logo .mark{color:var(--orange);font-size:20px}
  .logo .name{font-size:22px;font-weight:700;letter-spacing:.3px}
  .logo .by{font-size:9px;letter-spacing:2px;color:#8b93a3;text-transform:uppercase}
  .topright{display:flex;align-items:center;gap:10px}
  .status{display:flex;align-items:center;gap:8px;padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:600}
  .s-enc{background:transparent;border:1px solid rgba(224,96,42,.55);color:#f0a07e}
  .s-sync{background:var(--green-soft);color:var(--green);border:1px solid #9FC98C}
  .s-off{background:rgba(255,255,255,.08);color:#c4c9d3;border:1px solid rgba(255,255,255,.18)}
  .howto{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:500}
  .user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:4px 10px 4px 4px;color:#fff;font-size:13px;font-weight:500}
  .ava{width:28px;height:28px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}

  .toolbar{display:flex;align-items:center;gap:14px;background:var(--bar);padding:14px 20px}
  .crumb{flex:1 1 0;min-width:0;font-size:14px;color:var(--muted)}
  .crumb b{color:var(--ink)}
  .primary{flex:0 0 auto;display:flex;align-items:center;gap:18px}
  .circle{width:78px;height:78px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;line-height:1.05;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.22);cursor:pointer}
  .c-add{background:var(--orange);color:#fff;font-size:14px}
  .c-add .ti{font-size:19px;margin-bottom:1px}
  .c-audit{background:var(--navy);color:#fff;font-size:15px}
  .c-audit .ti{font-size:19px;margin-bottom:1px}

  .rightgrp{flex:1 1 0;display:flex;flex-direction:column;align-items:flex-end;gap:9px}
  .rrow{display:flex;align-items:center;gap:10px}
  .seg{display:flex;background:var(--slate);border-radius:10px;padding:3px}
  .seg button{border:none;background:transparent;color:#c7cbd3;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .seg button.active{background:#fff;color:var(--ink)}
  .group{display:flex;align-items:center;gap:8px}
  .glabel{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin-right:2px}
  .ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;cursor:pointer}
  .ghost .ti{color:var(--muted)}
  .divider{width:1px;height:26px;background:rgba(0,0,0,.14)}
  .iconbtn{background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:9px;width:38px;height:38px;font-size:18px;cursor:pointer}

  .canvas{height:120px;background:var(--surface);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:13px}
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="logo"><span class="mark"><i class="ti ti-map-pin-filled"></i></span><span class="name">markur</span><span class="by">by officemark</span></div>
      <div class="topright">
        <span class="status s-enc"><i class="ti ti-lock"></i> Encrypted</span>
        <span class="status s-sync"><i class="ti ti-circle-check"></i> Synced</span>
        <button class="howto"><i class="ti ti-help-circle" style="vertical-align:-2px"></i> How to</button>
        <div class="user"><span class="ava">RH</span> Randy Hough <i class="ti ti-chevron-down" style="font-size:14px"></i></div>
      </div>
    </div>

    <div class="toolbar">
      <div class="crumb">Home &nbsp;›&nbsp; Crescent School &nbsp;›&nbsp; <b>Floor Level 300</b></div>

      <div class="primary">
        <button class="circle c-add"><i class="ti ti-pin"></i>Add pin</button>
        <button class="circle c-audit"><i class="ti ti-clipboard-check"></i>Audit</button>
      </div>

      <div class="rightgrp">
        <div class="rrow">
          <div class="seg">
            <button class="active"><i class="ti ti-map"></i> Map</button>
            <button><i class="ti ti-layout-grid"></i> Grid</button>
            <button><i class="ti ti-notes"></i> Notes</button>
          </div>
          <button class="iconbtn" title="More — Replace plan, etc."><i class="ti ti-dots"></i></button>
        </div>
        <div class="rrow">
          <span class="glabel">Filter</span>
          <div class="seg">
            <button><i class="ti ti-map-2"></i> Zone</button>
            <button><i class="ti ti-category"></i> Type</button>
          </div>
          <button class="ghost toggle"><i class="ti ti-cloud-off"></i> Offline</button>
          <button class="ghost"><i class="ti ti-eye"></i> Visualize</button>
        </div>
      </div>
    </div>

    <div class="canvas">— floor plan —</div>
  </div>
</body>
</html>
