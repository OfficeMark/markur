[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--no-audit --no-fund"

# SPA fallback — every route serves index.html so React Router can take over.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible default headers (tighten further in M10).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # M27: in-app audit-video recording uses getUserMedia, so camera +
    # microphone must be granted to the same origin. Cross-origin embeds
    # still can't use them. Geolocation stays locked — we don't use it.
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
