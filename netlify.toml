[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--no-audit --no-fund"

# Marketing shortcuts — /demo and /trial funnel to the auth screen.
# 302 (temporary) so we can move the target later without breaking cached bookmarks.
# Placed BEFORE the SPA catch-all so Netlify's first-match wins.
[[redirects]]
  from = "/demo"
  to = "/login?mode=signup"
  status = 302
  force = true

[[redirects]]
  from = "/trial"
  to = "/login?mode=signup"
  status = 302
  force = true

# SPA fallback — every route serves index.html so React Router can take over.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible default headers (tighten further in M10).
# The HTML shell is served at EVERY route ("/", "/buildings/:id", …) via the SPA
# fallback, and the browser requests the bare route ("/"), never "/index.html" —
# so no-cache must live on /* (a "/index.html" rule never matches the real
# request). This makes a device always re-validate the shell after a deploy and
# stop requesting chunk hashes the new build removed (the "'text/html' is not a
# valid JavaScript MIME type" stale-chunk crash). /assets/* below is the more
# specific / last rule, so hashed assets still win the immutable cache.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # M27: in-app audit-video recording uses getUserMedia, so camera +
    # microphone must be granted to the same origin. Cross-origin embeds
    # still can't use them. Geolocation stays locked — we don't use it.
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
